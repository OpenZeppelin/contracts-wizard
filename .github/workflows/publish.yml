name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Verify OIDC auth without publishing'
        type: boolean
        default: false

concurrency: version-or-publish-${{ github.ref }}

jobs:
  publish:
    name: Publish Packages
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # To get all tags
          ref: ${{ github.ref }}
      - name: Set up environment
        uses: ./.github/actions/setup
      - name: Install npm 11 for OIDC trusted publishing
        run: npm install -g npm@11.12.1
      - name: Dry run publish
        if: inputs.dry_run
        run: NPM_CONFIG_DRY_RUN=true yarn changeset publish --no-git-tag
        env:
          NPM_CONFIG_PROVENANCE: true
      - name: Create Prepare Release PR or Publish
        if: ${{ !inputs.dry_run }}
        id: changesets
        uses: changesets/action@e0145edc7d9d8679003495b11f87bd8ef63c0cba # v1.5.3
        with:
          title: Prepare Release
          commit: Prepare Release
          version: npm run version
          publish: npm run publish
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
      - name: Check changesets status
        if: ${{ !inputs.dry_run && steps.changesets.outputs.hasChangesets == 'true' }}
        run: |
          echo "Changesets found. Merge Prepare Release PR before publishing."
          exit 1
      - name: Check publish status
        if: ${{ !inputs.dry_run && steps.changesets.outputs.published == 'false' }}
        run: |
          echo "Publish failed. Check the logs for more details."
          exit 1
