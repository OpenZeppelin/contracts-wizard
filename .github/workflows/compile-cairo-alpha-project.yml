name: Validate Cairo Alpha Test Project

on:
  pull_request:
    paths:
      - 'packages/core/cairo_alpha/**'
  push:
    paths:
      - 'packages/core/cairo_alpha/**'

jobs:
  validate-cairo-alpha:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kind: [ERC20, ERC721, ERC1155, ERC6909, Account, Multisig, Governor, Vesting, Custom]
    concurrency:
      group: validate-cairo-alpha-${{ matrix.kind }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        working-directory: packages/core/cairo_alpha
        run: yarn install --network-concurrency 1

      - name: Extract Scarb version
        working-directory: packages/core/cairo_alpha/test_project
        run: |
          SCARB_VERSION=$(grep 'scarb-version = ' Scarb.toml | sed 's/scarb-version = "\(.*\)"/\1/')
          echo "SCARB_VERSION=$SCARB_VERSION" >> "$GITHUB_ENV"

      - name: Setup Scarb
        uses: software-mansion/setup-scarb@95ba816a4383938e2338cb793773d4670011b65f # v1.6.0
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Generate and compile test project
        working-directory: packages/core/cairo_alpha/test_project
        env:
          KIND: ${{ matrix.kind }}
        run: |
          # Exit immediately if a command exits with a non-zero status
          set -e

          declare -a all_macros_options=("none" "with_components")
          declare -a all_access_options=("disabled" "ownable" "roles" "roles-dar-default" "roles-dar-custom")
          declare -a all_upgradeable_options=("true" "false")
          declare -a all_royalty_options=("disabled" "enabled-default" "enabled-custom")

          kind="$KIND"

          for macros_option in "${all_macros_options[@]}"; do
            if [[ "$kind" == "ERC721" || "$kind" == "ERC1155" ]]; then
              for access_option in "${all_access_options[@]}"; do
                for upgradeable_option in "${all_upgradeable_options[@]}"; do
                  for royalty_option in "${all_royalty_options[@]}"; do
                    proj_name="'$kind, macros: $macros_option, access: $access_option, upgradeable: $upgradeable_option, royalty: $royalty_option' test project"
                    echo "Generating $proj_name..."
                    yarn run update_scarb_project --kind=$kind --macros=$macros_option --access=$access_option --upgradeable=$upgradeable_option --royalty=$royalty_option

                    echo "Compiling $proj_name..."
                    scarb clean
                    scarb build

                    echo "✅ Compiled $proj_name!"
                    echo "---------------------------------"
                  done
                done
              done

            elif [[ "$kind" == "ERC20" || "$kind" == "ERC6909" || "$kind" == "Custom" ]]; then
              for access_option in "${all_access_options[@]}"; do
                proj_name="'$kind, macros: $macros_option, access: $access_option' test project"
                echo "Generating $proj_name..."
                yarn run update_scarb_project --kind=$kind --macros=$macros_option --access=$access_option

                echo "Compiling $proj_name..."
                scarb clean
                scarb build

                echo "✅ Compiled $proj_name!"
                echo "---------------------------------"
              done

            else
              proj_name="'$kind, macros: $macros_option' test project"

              echo "Generating $proj_name..."
              yarn run update_scarb_project --kind=$kind --macros=$macros_option

              echo "Compiling $proj_name..."
              scarb clean
              scarb build

              echo "✅ Compiled $proj_name!"
              echo "---------------------------------"
            fi
          done

  validate-cairo-alpha-summary:
    needs: validate-cairo-alpha
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix result
        run: |
          if [[ "${{ needs.validate-cairo-alpha.result }}" != "success" ]]; then
            echo "validate-cairo-alpha matrix result: ${{ needs.validate-cairo-alpha.result }}"
            exit 1
          fi
